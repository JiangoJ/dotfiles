# remap prefix from 'C-b' to 'C-a'
unbind C-b
set-option -g prefix C-a
bind-key C-a send-prefix

# reload tmux config
bind r source-file ~/.tmux.conf

# Bind new session
bind C-f run-shell "tmux neww ~/.local/bin/tmux-sessionizer.sh"
# Session jumping with `fzf`
bind f display-popup -E "~/.local/bin/tmux-fzf.sh"

# New window via fzf directory picker
bind C-n run-shell "tmux neww ~/.local/bin/tmux-window.sh"
# Jump to window in current session via fzf
bind n display-popup -E "~/.local/bin/tmux-window-fzf.sh"

# Toggle claude pane
bind C-t run-shell "~/.local/bin/tmux-claude-toggle.sh"

# mouse support
set -g mouse on
# use system clipboard
set -s set-clipboard on
setw -g mode-keys vi
bind-key -T copy-mode-vi v send -X begin-selection
bind-key -T copy-mode-vi V send -X select-line
bind-key -T copy-mode-vi y send -X copy-pipe-and-cancel 'pbcopy'
# start windows and panes at 1, not 0

set -g base-index 1
set -g pane-base-index 1

# auto renumber windows on close
set -g renumber-windows on

# pane navigation
bind h select-pane -L
bind j select-pane -D
bind k select-pane -U
bind l select-pane -R

# pane resizing
unbind Up
unbind Down
unbind Left
unbind Right
bind -r Up resize-pane -U 5
bind -r Down resize-pane -D 5
bind -r Left resize-pane -L 5
bind -r Right resize-pane -R 5

# intuitive splits
bind "\\" split-window -h
bind "-" split-window -v
